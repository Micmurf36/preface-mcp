services:
  brief:
    build: .
    ports:
      - "${BRIEF_PORT:-8080}:${BRIEF_PORT:-8080}"
    volumes:
      # SQLite database is stored in a named volume so it survives restarts
      - brief_data:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:${BRIEF_PORT:-8080}/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  brief_data:
